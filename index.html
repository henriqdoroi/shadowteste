<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowPay - Automação Push</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-button {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
        }
        body {
            background: radial-gradient(circle at top, #1a0b2e 0%, #09090b 50%);
            min-height: 100vh;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-zinc-100 flex items-center justify-center p-4 font-sans selection:bg-purple-500 selection:text-white pb-20">

    <div class="bg-zinc-900/80 backdrop-blur-xl p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/5 relative overflow-hidden mt-8">
        
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-3/4 h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent opacity-50"></div>

        <div class="text-center mb-6 flex flex-col items-center">
            <div class="flex items-center gap-3 mb-2">
                <img src="https://i.postimg.cc/W1vZvNhS/Design-sem-nome-(12).png" alt="ShadowPay Logo" class="w-10 h-10 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] border border-purple-500/20">
                <h1 class="text-xl font-black tracking-tighter text-white italic">
                    Shadow<span class="text-purple-500">Pay</span>
                </h1>
            </div>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] font-bold">Simulator Core v2</p>
        </div>

        <button onclick="requestPermission()" id="permBtn" class="w-full mb-6 bg-zinc-950 hover:bg-zinc-800 text-zinc-400 font-semibold py-3 px-4 rounded-xl border border-zinc-800 transition-all text-xs flex items-center justify-center gap-2 group">
            <svg class="w-4 h-4 text-zinc-500 group-hover:text-purple-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
            </svg>
            <span id="permText">1. Conectar Sistema Nativo</span>
        </button>

        <div class="space-y-6">
            
            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase mb-1.5 ml-1 tracking-wider">Valor Base (R$)</label>
                <div class="relative flex items-center">
                    <svg class="w-4 h-4 text-zinc-600 absolute left-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <input type="text" id="saleValue" value="97,00" class="w-full bg-zinc-950/50 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-zinc-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm font-medium">
                </div>
            </div>

            <div class="w-full h-px bg-zinc-800/50"></div>

            <div>
                <label class="block text-[10px] font-bold text-purple-400 uppercase mb-3 ml-1 tracking-wider flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    Disparo Manual
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="triggerManual('pendente')" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-3 rounded-xl border border-zinc-700 transition-all text-[11px] uppercase tracking-wide flex items-center justify-center gap-1">
                        <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Pendente
                    </button>
                    <button onclick="triggerManual('aprovada')" class="bg-purple-600/20 hover:bg-purple-600/30 text-purple-400 font-bold py-3 rounded-xl border border-purple-500/30 transition-all text-[11px] uppercase tracking-wide flex items-center justify-center gap-1">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Aprovada
                    </button>
                </div>
                <p class="text-[9px] text-zinc-500 mt-2 text-center italic">Vendas pendentes manuais também aprovam em 1 min.</p>
            </div>

            <div class="w-full h-px bg-zinc-800/50"></div>

            <div>
                <label class="block text-[10px] font-bold text-purple-400 uppercase mb-3 ml-1 tracking-wider flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Robô de Conversão
                </label>
                
                <div class="flex gap-2 items-center mb-4">
                    <input type="number" id="autoQty" value="1" min="1" class="w-16 bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-2.5 text-zinc-200 text-center text-sm focus:outline-none focus:border-purple-500">
                    <span class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">por</span>
                    <select id="autoUnit" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-zinc-200 text-sm focus:outline-none focus:border-purple-500 appearance-none">
                        <option value="1000">Segundo</option>
                        <option value="60000">Minuto</option>
                    </select>
                </div>

                <div class="grid grid-cols-1" id="actionButtons">
                    <button onclick="startAuto()" id="btnStart" class="bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded-xl glow-button transition-all text-[11px] uppercase tracking-widest flex items-center justify-center gap-1 w-full">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132A1 1 0 0015 14.133v-4.266a1 1 0 00-.248-.699z"></path></svg>
                        Iniciar Robô
                    </button>
                    
                    <button onclick="stopAuto()" id="btnStop" class="hidden bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border border-rose-500/30 font-black py-3 rounded-xl transition-all text-[11px] uppercase tracking-widest flex items-center justify-center gap-1 w-full">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                        Parar Robô
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Áudio do Cash -->
    <audio id="cashSound" src="https://www.myinstants.com/media/sounds/ca-ching.mp3" preload="auto"></audio>

    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const logoUrl = 'https://i.postimg.cc/W1vZvNhS/Design-sem-nome-(12).png';
        let robotInterval = null;

        // Verifica permissão ao carregar
        window.onload = () => {
            if (Notification.permission === 'granted') {
                setPermissionGranted();
            }
        };

        function setPermissionGranted() {
            const btn = document.getElementById('permBtn');
            btn.className = "w-full mb-6 bg-emerald-500/10 text-emerald-400 font-semibold py-3 px-4 rounded-xl border border-emerald-500/30 flex items-center justify-center gap-2";
            btn.innerHTML = `
                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-xs">Sistema Conectado</span>
            `;
        }

        function requestPermission() {
            if (!("Notification" in window)) {
                alert("Seu navegador não suporta push nativo.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') setPermissionGranted();
                else alert("Permissão negada. Autorize no navegador.");
            });
        }

        function playAudio() {
            const audio = document.getElementById('cashSound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Áudio bloqueado até interação."));
        }

        // Função Central de Disparo de Push
        function sendPush(title, value) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, {
                        body: `Valor: R$ ${value}`,
                        icon: logoUrl,
                        badge: logoUrl,
                        vibrate: [200, 100, 200],
                        requireInteraction: false
                    });
                });
                // Toca som na hora que gera (seja pendente ou aprovada)
                playAudio(); 
            } else {
                alert("Conecte o sistema nativo (botão 1) primeiro.");
            }
        }

        // Disparo Manual (Botões)
        function triggerManual(type) {
            const val = document.getElementById('saleValue').value;
            
            if (type === 'pendente') {
                sendPush('Venda Pendente', val);
                // Agenda a aprovação para 60 segundos (60000 ms) depois
                setTimeout(() => {
                    sendPush('Venda Aprovada', val);
                }, 60000);
            } else {
                sendPush('Venda Aprovada', val);
            }
        }

        // Robô (Automação em Massa)
        function startAuto() {
            if (Notification.permission !== 'granted') {
                alert("Conecte o sistema nativo primeiro!");
                return;
            }

            const qty = parseInt(document.getElementById('autoQty').value) || 1;
            const timeUnit = parseInt(document.getElementById('autoUnit').value); // 1000 = Seg, 60000 = Min
            const val = document.getElementById('saleValue').value;

            // Calcula o tempo de intervalo. Ex: 2 por segundo = a cada 500ms
            const intervalMs = timeUnit / qty;

            document.getElementById('btnStart').classList.add('hidden');
            document.getElementById('btnStop').classList.remove('hidden');

            // Inicia o loop
            robotInterval = setInterval(() => {
                sendPush('Venda Pendente', val);
                
                // Agenda a aprovação dessa venda específica para 60 seg depois
                setTimeout(() => {
                    sendPush('Venda Aprovada', val);
                }, 60000);

            }, intervalMs);
        }

        function stopAuto() {
            clearInterval(robotInterval);
            document.getElementById('btnStart').classList.remove('hidden');
            document.getElementById('btnStop').classList.add('hidden');
        }
    </script>
</body>
</html>
