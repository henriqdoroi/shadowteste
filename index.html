<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowPay - Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast-exit {
            animation: slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .glow-button {
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(147, 51, 234, 0.6);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a855f7; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 font-sans selection:bg-purple-500 selection:text-white">

    <div class="bg-zinc-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-zinc-800">
        <div class="text-center mb-8 flex flex-col items-center">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-purple-500/20">
                    S
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white italic">
                    Shadow<span class="text-purple-500">Pay</span>
                </h1>
            </div>
            <p class="text-zinc-500 text-sm uppercase tracking-widest font-semibold">Notification Generator</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-1 ml-1">Comprador</label>
                <input type="text" id="buyerName" placeholder="Ex: Marcos Oliveira" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder:text-zinc-700">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-1 ml-1">Produto</label>
                <input type="text" id="productName" placeholder="Ex: Método ShadowAds" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder:text-zinc-700">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-1 ml-1">Valor (R$)</label>
                <input type="text" id="saleValue" placeholder="Ex: 497,00" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder:text-zinc-700">
            </div>

            <button onclick="triggerNotification()" class="w-full mt-6 bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl glow-button transition-all transform active:scale-95 uppercase tracking-tighter">
                Gerar Notificação
            </button>
        </div>
        
        <p class="text-center text-[10px] text-zinc-600 mt-8 uppercase tracking-widest italic">ShadowPay © 2024 - Secure Gateway</p>
    </div>

    <div id="notificationToast" class="fixed top-6 right-6 hidden bg-zinc-900/95 backdrop-blur-md rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-purple-500/20 overflow-hidden max-w-sm w-full z-50">
        <div class="p-5 flex items-center gap-4">
            <div class="flex-shrink-0 w-14 h-14 rounded-2xl overflow-hidden shadow-lg border border-purple-500/20">
               <img src="https://i.postimg.cc/W1vZvNhS/Design-sem-nome-(12).png" alt="Logo ShadowPay" class="w-full h-full object-cover">
           </div>
            
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <p class="text-[10px] font-bold text-purple-400 uppercase tracking-[0.2em] mb-1">Venda Aprovada</p>
                    <span class="text-[9px] text-zinc-500 font-medium">agora</span>
                </div>
                <p class="text-sm text-zinc-100 font-semibold line-clamp-1"><span id="toastBuyer"></span> comprou</p>
                <p class="text-xs text-zinc-400 line-clamp-1 mb-1" id="toastProduct"></p>
                <p class="text-xl font-black text-purple-400 leading-none mt-1">R$ <span id="toastValue"></span></p>
            </div>
        </div>
        <div class="h-1.5 w-full bg-zinc-800">
            <div id="toastProgress" class="h-full bg-purple-500 w-full shadow-[0_0_15px_rgba(168,85,247,0.6)]"></div>
        </div>
    </div>

    <audio id="cashSound" src="https://www.myinstants.com/media/sounds/ca-ching.mp3" preload="auto"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function triggerNotification() {
            const buyer = document.getElementById('buyerName').value || 'Marcos Oliveira';
            const product = document.getElementById('productName').value || 'Método ShadowAds';
            const value = document.getElementById('saleValue').value || '497,00';

            document.getElementById('toastBuyer').innerText = buyer;
            document.getElementById('toastProduct').innerText = product;
            document.getElementById('toastValue').innerText = value;

            const toast = document.getElementById('notificationToast');
            const progress = document.getElementById('toastProgress');
            const audio = document.getElementById('cashSound');

            audio.currentTime = 0;
            audio.play().catch(() => console.log("Interação necessária para som"));

            toast.classList.remove('hidden', 'toast-exit');
            toast.classList.add('toast-enter');

            progress.style.transition = 'none';
            progress.style.width = '100%';
            
            setTimeout(() => {
                progress.style.transition = 'width 4.5s linear';
                progress.style.width = '0%';
            }, 50);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.classList.add('hidden'), 400);
            }, 4500);
        }
    </script>
</body>
</html>
